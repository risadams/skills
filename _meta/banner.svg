<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" role="img" aria-label="Ink and Agency Skills Pack — a library of Claude-compatible skills">
  <defs>
    <!-- watercolor displacement (matches logo style) -->
    <filter id="b-wc" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="8"/>
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
    <filter id="b-wch" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="18"/>
    </filter>
    <!-- subtle paper grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="soft-light" result="out"/>
      <feComposite in="out" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background: warm off-white -->
  <rect width="900" height="220" fill="#faf8f5" rx="8"/>
  <!-- Paper grain overlay -->
  <rect width="900" height="220" fill="#faf8f5" rx="8" filter="url(#grain)" opacity="0.18"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="220" fill="#CB0162"/>

  <!-- Logo mark — original paths from risadams.com/img/logo.svg, scaled 0.8, positioned left -->
  <g transform="translate(25,10) scale(0.8)">
    <!-- teal bleed shadow -->
    <g filter="url(#b-wch)">
      <ellipse cx="108" cy="74" rx="22" ry="20" fill="#1a5b6e" opacity="0.55"/>
      <path d="M 92 118 Q 92 102 106 102 Q 120 102 120 118 Q 120 132 114 144 Q 110 154 104 166 Q 102 168 100 164 Q 94 154 92 144 Q 88 132 92 118 Z"
            fill="#1a5b6e" opacity="0.55"/>
    </g>
    <!-- rose mark -->
    <g filter="url(#b-wc)">
      <ellipse cx="100" cy="66" rx="22" ry="20" fill="#CB0162"/>
    </g>
    <g filter="url(#b-wch)">
      <path d="M 86 110 Q 86 92 100 92 Q 114 92 114 110 Q 114 126 108 140 Q 104 152 98 166 Q 96 168 94 162 Q 88 148 86 138 Q 82 124 86 110 Z"
            fill="#CB0162"/>
    </g>
  </g>

  <!-- Title -->
  <text x="150" y="90"
        font-family="Georgia,'Times New Roman',serif"
        font-size="44" font-weight="700"
        fill="#1a1a1a" letter-spacing="-1">Ink and Agency · Skill Pack</text>

  <!-- Subtitle — terminal-style, teal -->
  <text x="153" y="120"
        font-family="'Courier New',Courier,monospace"
        font-size="14" fill="#1a5b6e" letter-spacing="0.5">&gt;_ ship code · stay human</text>

  <!-- Thin rose rule -->
  <line x1="150" y1="136" x2="875" y2="136"
        stroke="#CB0162" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Category pills -->
  <g font-family="system-ui,-apple-system,sans-serif" font-size="11.5" font-weight="600">
    <rect x="150" y="150" width="70"  height="24" rx="12" fill="#CB0162" fill-opacity="0.13"/>
    <text x="185"  y="166" text-anchor="middle" fill="#CB0162">writing</text>

    <rect x="228"  y="150" width="74"  height="24" rx="12" fill="#1a5b6e" fill-opacity="0.13"/>
    <text x="265"  y="166" text-anchor="middle" fill="#1a5b6e">analysis</text>

    <rect x="310"  y="150" width="70"  height="24" rx="12" fill="#CB0162" fill-opacity="0.13"/>
    <text x="345"  y="166" text-anchor="middle" fill="#CB0162">planning</text>

    <rect x="388"  y="150" width="104" height="24" rx="12" fill="#1a5b6e" fill-opacity="0.13"/>
    <text x="440"  y="166" text-anchor="middle" fill="#1a5b6e">collaboration</text>

    <rect x="500"  y="150" width="82"  height="24" rx="12" fill="#CB0162" fill-opacity="0.13"/>
    <text x="541"  y="166" text-anchor="middle" fill="#CB0162">workspace</text>
  </g>

  <!-- Version stamp -->
  <text x="875" y="212" text-anchor="end"
        font-family="'Courier New',Courier,monospace"
        font-size="11" fill="#bbb">v1.0</text>
</svg>
